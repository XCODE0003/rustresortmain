name: Deploy to Production

on:
  push:
    branches:
      - main

# Сборка идёт НА СЕРВЕРЕ: там есть полное окружение Laravel (vendor, .env, БД),
# которое нужно vite-плагину Wayfinder (`php artisan wayfinder:generate`).
# Единственная проблема — non-interactive SSH по умолчанию берёт системную
# Node 18 (слишком старую для Vite 7), хотя в интерактивной сессии стоит Node 22+.
# Поэтому перед сборкой находим и активируем Node >= 20.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /var/www/www-root/data/www/dev.rustresort.com

            echo "==> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "==> Locating Node >= 20 (non-interactive SSH defaults to old system node)..."
            export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" >/dev/null 2>&1 || true
            NODE_BIN=""
            for c in \
              $(command -v node 2>/dev/null) \
              "$NVM_DIR"/versions/node/*/bin/node \
              /opt/nodejs*/bin/node /opt/node*/bin/node \
              /usr/local/bin/node /usr/local/node/bin/node /usr/bin/node; do
              [ -x "$c" ] || continue
              maj=$("$c" -p 'process.versions.node.split(".")[0]' 2>/dev/null || echo 0)
              if [ "${maj:-0}" -ge 20 ] 2>/dev/null; then NODE_BIN="$c"; break; fi
            done
            if [ -z "$NODE_BIN" ]; then
              echo "ERROR: no Node >= 20 found on server (Vite 7 needs 20.19+/22.12+)." >&2
              echo "Checked nvm, /opt/nodejs*, /opt/node*, /usr/local, /usr/bin." >&2
              exit 1
            fi
            export PATH="$(dirname "$NODE_BIN"):$PATH"
            echo "Using node $(node -v) / npm $(npm -v) at $NODE_BIN"

            echo "==> Installing JS deps (clean, reproducible from package-lock.json)..."
            npm ci --no-audit --no-fund

            echo "==> Building assets..."
            npm run build

            echo "==> Running migrations..."
            /opt/php84/bin/php artisan migrate --force

            echo "==> Caching config, routes, views, events..."
            /opt/php84/bin/php artisan config:cache
            /opt/php84/bin/php artisan route:cache
            /opt/php84/bin/php artisan view:cache
            /opt/php84/bin/php artisan event:cache

            echo "==> Restarting queue workers..."
            /opt/php84/bin/php artisan queue:restart

            echo "==> Done!"
