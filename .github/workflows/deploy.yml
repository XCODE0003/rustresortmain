name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /var/www/www-root/data/www/dev.rustresort.com

            echo "==> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd



            echo "==> Node/npm versions:"
            node -v && npm -v

            echo "==> Installing JS dependencies (clean, reproducible from package-lock.json)..."
            npm ci --no-audit --no-fund

            echo "==> Building assets..."
            npm run build

            echo "==> Running migrations..."
            /opt/php84/bin/php artisan migrate --force

            echo "==> Caching config, routes, views..."
            /opt/php84/bin/php artisan config:cache
            /opt/php84/bin/php artisan route:cache
            /opt/php84/bin/php artisan view:cache
            /opt/php84/bin/php artisan event:cache

            echo "==> Restarting queue workers..."
            /opt/php84/bin/php artisan queue:restart

            echo "==> Done!"
