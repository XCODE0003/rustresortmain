name: Deploy to Production

on:
  push:
    branches:
      - main

# Сборка фронта идёт НА РАННЕРЕ (Node 22), а не на сервере: у сервера в
# non-interactive SSH стоит Node 18 / npm 9 — слишком старый для Vite 7
# (нужен 20.19+/22.12+) и ломается на нативных биндингах @tailwindcss/oxide.
# Поэтому: собираем assets здесь, заливаем public/build по SCP, а на сервере
# выполняем только PHP-шаги (код + миграции + кэш + queue:restart).
env:
  DEPLOY_PATH: /var/www/www-root/data/www/dev.rustresort.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build assets
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Update code, migrate & cache on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}

            echo "==> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd   # public/build игнорируется gitignore и НЕ удаляется

            echo "==> Migrations..."
            /opt/php84/bin/php artisan migrate --force

      - name: Upload built assets (public/build)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "public/build"
          target: "${{ env.DEPLOY_PATH }}/public"
          strip_components: 1
          overwrite: true

      - name: Cache config/routes/views & restart queue
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}

            echo "==> Caching config, routes, views, events..."
            /opt/php84/bin/php artisan config:cache
            /opt/php84/bin/php artisan route:cache
            /opt/php84/bin/php artisan view:cache
            /opt/php84/bin/php artisan event:cache

            echo "==> Restarting queue workers..."
            /opt/php84/bin/php artisan queue:restart

            echo "==> Done!"
